<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B3161"/>
      <stop offset="100%" stop-color="#2793b4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Fondo: cuadrado redondeado con gradiente profundo -->
  <rect x="8" y="8" width="184" height="184" rx="38" fill="url(#bgGrad)"/>

  <!-- Brillo sutil en la mitad superior para dar profundidad -->
  <rect x="8" y="8" width="184" height="92" rx="38" fill="url(#shine)"/>

  <!-- Letra "g" en serif elegante, centrada -->
  <text
    x="100" y="143"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="134"
    font-weight="400"
    fill="white"
    text-anchor="middle"
    opacity="0.97"
    letter-spacing="-2">g</text>

  <!-- Acento: estrella de 4 puntas (indicador de IA) en verde secundario -->
  <g transform="translate(152, 50)">
    <path d="M0,-12 L2.8,-2.8 L12,0 L2.8,2.8 L0,12 L-2.8,2.8 L-12,0 L-2.8,-2.8 Z"
          fill="#37c88e" opacity="0.90"/>
  </g>
</svg>
