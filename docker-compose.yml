
services:
  # MongoDB (base de datos principal)
  mongo:
    image: mongo:7
    container_name: gestionar_mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    command: --wiredTigerCacheSizeGB 0.25
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis (cache e idempotencia)
  redis:
    image: redis:7-alpine
    container_name: gestionar_redis
    ports:
      - "6380:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Aplicación FastAPI (backend)
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestionar_app
    env_file:
      - ./backend/.env.dev
    environment:
      - MONGODB_URI=mongodb://mongo:27017/gestionar
      - REDIS_URL=redis://redis:6379
      - CHROMA_PATH=/app/chroma_db
    volumes:
      - chroma_data:/app/chroma_db
      - ./docs:/app/documents
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - default

  # Frontend React (Nginx — proxy /api/ y /ws/ al backend internamente)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gestionar_frontend
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - default
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gestionar.rule=Host(`dev.gestionar.kairosgroup.ar`)"
      - "traefik.http.routers.gestionar.entrypoints=websecure"
      - "traefik.http.routers.gestionar.tls.certresolver=letsencrypt"
      - "traefik.http.services.gestionar.loadbalancer.server.port=80"

  # Traefik — solo activo con: docker compose --profile traefik up -d
  traefik:
    image: traefik:v3.6
    container_name: gestionar_traefik
    restart: unless-stopped
    profiles: ["traefik"]
    ports:
      - "80:80"
      - "443:443"
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=traefik_public
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --certificatesresolvers.letsencrypt.acme.email=admin@kairosgroup.ar
      - --certificatesresolvers.letsencrypt.acme.storage=/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --log.level=INFO
      - --accesslog=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./acme.json:/acme.json
    networks:
      - traefik_public

volumes:
  mongo_data:
  chroma_data:

networks:
  default:
    name: gestionar_network
  traefik_public:
    name: gestionar_traefik_public
