# docker-compose.prod.yml — Overrides de producción
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requiere en el servidor:
#   - .env              → REGISTRY_IMAGE=registry.gitlab.com/NAMESPACE/PROJECT
#   - backend/.env.prod → credenciales reales
#   - docs/             → directorio (puede estar vacío)

services:
  app:
    image: ${REGISTRY_IMAGE}/backend:${IMAGE_TAG:-latest}
    env_file:
      - ./backend/.env.prod
    environment:
      - MONGODB_URI=mongodb://mongo:27017/gestionar
      - REDIS_URL=redis://redis:6379
      - CHROMA_PATH=/app/chroma_db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gestionar-api.rule=Host(`api.gestionar.kairosgroup.ar`)"
      - "traefik.http.routers.gestionar-api.entrypoints=websecure"
      - "traefik.http.routers.gestionar-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.gestionar-api.loadbalancer.server.port=8000"

  frontend:
    image: ${REGISTRY_IMAGE}/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gestionar.rule=Host(`gestionar.kairosgroup.ar`)"
      - "traefik.http.routers.gestionar.entrypoints=websecure"
      - "traefik.http.routers.gestionar.tls.certresolver=letsencrypt"
      - "traefik.http.services.gestionar.loadbalancer.server.port=80"
